<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Знаешь ли ты мир и своих?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap');
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f172a, #1e2937, #334155);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }

        .container {
            height: 100vh;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
        }

        /* Стартовый экран */
        #start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #start-screen h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.1em;
            font-weight: 900;
            margin: 0 0 8px;
            background: linear-gradient(90deg, #60a5fa, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.25em;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        #playerName {
            width: 100%;
            max-width: 380px;
            padding: 16px 20px;
            font-size: 1.2em;
            border-radius: 18px;
            border: none;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.95);
            color: #1e2937;
        }

        #start-btn {
            width: 100%;
            max-width: 380px;
            padding: 18px;
            font-size: 1.35em;
            font-weight: 700;
            border-radius: 18px;
            border: none;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            color: white;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5);
        }

        /* Квиз экран */
        #quiz-screen {
            flex: 1;
            display: none;
            flex-direction: column;
        }

        .progress-container {
            height: 8px;
            background: rgba(255,255,255,0.1);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #a5b4fc);
            width: 0%;
            transition: width 0.5s ease;
        }

        .quiz-content {
            flex: 1;
            padding: 20px 18px 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #section-title { font-size: 1.05em; color: #93c5fd; margin-bottom: 4px; }
        #question-number { font-size: 0.95em; color: #cbd5e1; margin-bottom: 10px; }

        #question-container {
            font-size: 1.28em;
            line-height: 1.4;
            margin: 10px 0 20px;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .timer {
            font-size: 2.4em;
            font-weight: 700;
            color: #bae6fd;
            text-align: center;
            margin: 10px 0;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }

        .answer-btn {
            padding: 17px 20px;
            font-size: 1.08em;
            background: rgba(255,255,255,0.09);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 62px;
            display: flex;
            align-items: center;
        }

        .answer-btn:hover, .answer-btn:active {
            transform: translateX(8px);
            background: rgba(255,255,255,0.2);
        }

        .answer-btn.correct { background: #4ade80; color: #0f172a; border-color: #4ade80; }
        .answer-btn.wrong { background: #f87171; color: white; border-color: #f87171; }

        #main-btn {
            margin: 10px 18px 18px;
            padding: 16px;
            font-size: 1.3em;
            font-weight: 700;
            background: linear-gradient(90deg, #3b82f6, #6366f1);
            border: none;
            border-radius: 18px;
            color: white;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.5);
        }

        #organizer-btn {
            position: fixed;
            top: 12px;
            right: 12px;
            width: 46px;
            height: 46px;
            background: rgba(255,255,255,0.15);
            border: none;
            border-radius: 50%;
            color: #e0f2fe;
            font-size: 22px;
            z-index: 200;
        }

        /* Результаты */
        #waiting-screen, #final-screen {
            flex: 1;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .score-big {
            font-size: 4.8em;
            font-weight: 900;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- Стартовый экран -->
    <div id="start-screen">
        <h1>Знаешь ли ты мир?</h1>
        <p class="subtitle">и своих на 100%</p>
        <input type="text" id="playerName" placeholder="Твоё имя">
        <button onclick="startQuiz()" id="start-btn">Начать квиз</button>
    </div>

    <!-- Квиз -->
    <div id="quiz-screen">
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div class="quiz-content">
            <div id="section-title"></div>
            <div id="question-number"></div>
            <div id="question-container"></div>
            <div class="timer" id="timer">30</div>
            <div class="answers" id="answers-container"></div>
        </div>
    </div>

    <button id="main-btn" onclick="nextQuestion()" style="display:none;">Далее →</button>

    <!-- Ожидание результата -->
    <div id="waiting-screen">
        <h2>Твой результат</h2>
        <div class="score-big" id="personal-score"></div>
        <p style="font-size:1.3em;">Ожидаем остальных...</p>
    </div>

    <!-- Финальный экран -->
    <div id="final-screen">
        <h2>🏆 Итоговая таблица</h2>
        <p id="winner-announce" style="font-size:1.7em; font-weight:700; margin:20px 0; color:#fcd34d;"></p>
        <table id="leaderboard" style="width:100%; border-collapse:collapse; background:rgba(255,255,255,0.08); border-radius:18px; overflow:hidden; max-width:420px;">
            <thead><tr><th style="padding:14px;">Место</th><th style="padding:14px;">Имя</th><th style="padding:14px;">Баллы</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top:30px; padding:16px 50px; font-size:1.2em; border-radius:18px; background:#4f46e5; color:white; font-weight:700;">Ещё раз</button>
    </div>
</div>

<button id="organizer-btn" onclick="showFinalLeaderboard()">🏆</button>

<!-- Звуки -->
<audio id="correctSound" src="https://assets.mixkit.co/sfx/preview/2965/2965.wav"></audio>
<audio id="wrongSound" src="https://assets.mixkit.co/sfx/preview/2952/2952.wav"></audio>
<audio id="winSound" src="https://assets.mixkit.co/sfx/preview/2967/2967.wav"></audio>

</body>
</html>
