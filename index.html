<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Квиз</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap');
        
        * { box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1e0b4b, #4a1d8c, #00d4ff);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            height: 100vh;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
        }

        #start-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px 25px;
        }

        .subtitle {
            font-size: 1.45em;
            font-weight: 600;
            margin-bottom: 45px;
            background: linear-gradient(90deg, #fff, #a5f3fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #playerName {
            width: 100%;
            max-width: 380px;
            padding: 18px 24px;
            font-size: 1.25em;
            border-radius: 20px;
            border: none;
            margin-bottom: 25px;
            background: rgba(255,255,255,0.95);
            color: #1e2937;
        }

        #start-btn {
            width: 100%;
            max-width: 380px;
            padding: 20px;
            font-size: 1.4em;
            font-weight: 700;
            border-radius: 20px;
            border: none;
            background: linear-gradient(90deg, #00f5ff, #00b8ff);
            color: #1e2937;
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.5);
        }

        /* Остальные стили (quiz, answers и т.д.) — такие же, как в предыдущей версии */
        .progress-container { height: 8px; background: rgba(255,255,255,0.15); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #00f5ff, #a5f3fc); width: 0%; transition: width 0.6s ease; }

        .quiz-content { flex: 1; padding: 20px 20px 15px; display: flex; flex-direction: column; }
        #question-container { font-size: 1.3em; line-height: 1.45; flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; }

        .answer-btn {
            padding: 18px 22px;
            font-size: 1.12em;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 20px;
            cursor: pointer;
            min-height: 65px;
            display: flex;
            align-items: center;
        }
        .answer-btn.correct { background: #22ff88; color: #0f172a; }
        .answer-btn.wrong { background: #ff4d4d; color: white; }

        #main-btn {
            margin: 10px 20px 20px;
            padding: 18px;
            font-size: 1.35em;
            font-weight: 700;
            background: linear-gradient(90deg, #00f5ff, #00b8ff);
            color: #1e2937;
            border: none;
            border-radius: 20px;
        }

        #organizer-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            z-index: 200;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <p class="subtitle">Знаешь ли ты мир и своих на 100%?</p>
        <input type="text" id="playerName" placeholder="Твоё имя">
        <button onclick="startQuiz()" id="start-btn">Начать квиз</button>
    </div>

    <div id="quiz-screen" style="display:none; flex-direction:column; flex:1;">
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div class="quiz-content">
            <div id="section-title"></div>
            <div id="question-number"></div>
            <div id="question-container"></div>
            <div class="timer" id="timer">30</div>
            <div class="answers" id="answers-container"></div>
        </div>
    </div>

    <button id="main-btn" onclick="nextQuestion()" style="display:none;">Далее →</button>

    <div id="waiting-screen" style="display:none; flex:1; flex-direction:column; justify-content:center; align-items:center; padding:25px; text-align:center;">
        <h2>Твой результат</h2>
        <div class="score-big" id="personal-score" style="font-size:5em; font-weight:900; margin:20px 0;"></div>
        <p style="font-size:1.35em;">Ожидаем остальных...</p>
    </div>

    <div id="final-screen" style="display:none; flex:1; flex-direction:column; justify-content:center; align-items:center; padding:25px; text-align:center;">
        <h2>🏆 Итоговая таблица</h2>
        <p id="winner-announce" style="font-size:1.75em; font-weight:700; margin:25px 0; color:#67e8f9;"></p>
        <table id="leaderboard" style="width:100%; max-width:420px; border-collapse:collapse; background:rgba(255,255,255,0.1); border-radius:20px;">
            <thead><tr><th style="padding:16px;">Место</th><th style="padding:16px;">Имя</th><th style="padding:16px;">Баллы</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="shareResult()" style="margin-top:25px; padding:16px 40px; font-size:1.2em; border-radius:20px; background:#00f5ff; color:#1e2937; font-weight:700;">Поделиться в чат</button>
    </div>
</div>

<button id="organizer-btn" onclick="showFinalLeaderboard()">🏆</button>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
// Инициализация Telegram WebApp
const tg = window.Telegram.WebApp;
tg.expand();                    // Разворачивает на полный экран
tg.enableClosingConfirmation(); // Спрашивает подтверждение при закрытии

// Темная тема Telegram
document.documentElement.style.setProperty('--tg-theme-bg-color', tg.themeParams.bg_color || '#1e0b4b');

// ==================== ВОПРОСЫ (те же) ====================
const questions = [ /* Вставь все 18 вопросов из предыдущей версии */ ];

let currentQuestion = 0;
let score = 0;
let playerName = '';
let allResults = [];

// ... (все функции startQuiz, showQuestion, selectAnswer, nextQuestion, showResult, showFinalLeaderboard — такие же, как раньше)

function startQuiz() {
    playerName = document.getElementById('playerName').value.trim();
    if (!playerName) {
        tg.showAlert("Введите своё имя ✨");
        return;
    }

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'flex';
    currentQuestion = 0;
    score = 0;
    showQuestion();
}

function showFinalLeaderboard() {
    // ... (логика таблицы)
    tg.MainButton.setText("Закрыть");
    tg.MainButton.show();
}

// Поделиться результатом
function shareResult() {
    const text = `Я прошёл квиз «Знаешь ли ты мир и своих»!\nМой результат: ${score}/${questions.length} 🎯\nПопробуй тоже!`;
    tg.shareToStory ? tg.shareToStory(text) : tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(text)}`);
}

// Главная кнопка Telegram
tg.MainButton.onClick(() => {
    tg.close();
});
</script>
</body>
</html>
