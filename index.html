<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Знаешь ли ты Никиту на 100%?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 640px;
            width: 100%;
            margin: 15px auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        header {
            background: linear-gradient(90deg, #6b46c1, #9f7aea);
            padding: 25px 20px 15px;
            text-align: center;
        }
        .cake-container {
            margin: 0 auto 12px;
            width: 190px;
            height: 150px;
        }
        .cake {
            width: 100%;
            animation: cakeFloat 3.5s ease-in-out infinite;
        }
        @keyframes cakeFloat {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            50% { transform: translateY(-15px) rotate(3deg); }
        }
        h1 {
            margin: 5px 0 0;
            font-family: 'Playfair Display', serif;
            font-size: 2.35em;
            font-weight: 700;
        }
        .subtitle {
            font-size: 1.22em;
            opacity: 0.95;
            margin-top: 8px;
        }

        .quiz-content {
            padding: 25px 30px 130px;
            position: relative;
        }
        #question-container {
            font-size: 1.33em;
            line-height: 1.45;
            margin-bottom: 25px;
            min-height: 90px;
        }
        .answers {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .answer-btn {
            padding: 18px 24px;
            font-size: 1.12em;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 18px;
            cursor: pointer;
            text-align: left;
        }
        .answer-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateX(12px);
        }
        .answer-btn.correct {
            background: #22c55e;
            color: white;
        }
        .answer-btn.wrong {
            background: #ef4444;
            color: white;
        }

        #main-btn {
            position: fixed;
            bottom: 75px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 580px;
            padding: 19px;
            font-size: 1.3em;
            font-weight: 600;
            background: #ff6b6b;
            border: none;
            border-radius: 18px;
            color: white;
            box-shadow: 0 10px 30px rgba(255,107,107,0.5);
            z-index: 90;
        }

        #organizer-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 40px;
            font-size: 1.15em;
            font-weight: 700;
            background: #ffd93d;
            color: #1a1a2e;
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.6);
            z-index: 100;
            cursor: pointer;
        }

        #waiting-screen, #final-screen {
            padding: 60px 30px;
            text-align: center;
            display: none;
        }
        .score-big {
            font-size: 5.2em;
            font-weight: 700;
            color: #ffd93d;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="cake-container">
            <img src="https://i.imgur.com/bV7un.gif" alt="Торт" class="cake">
        </div>
        <h1>Знаешь ли ты Никиту на 100%?</h1>
        <p class="subtitle">Юбилейный тест на настоящую дружбу 🎂</p>
    </header>

    <!-- Стартовый экран -->
    <div id="start-screen" class="quiz-content">
        <input type="text" id="playerName" placeholder="Твоё имя" 
               style="width:100%; padding:18px; font-size:1.15em; border-radius:16px; border:none; margin-bottom:20px; box-sizing:border-box;">
        <button onclick="startQuiz()" style="width:100%; padding:18px; font-size:1.25em; border-radius:16px;">Начать тест</button>
    </div>

    <!-- Экран квиза -->
    <div id="quiz-screen" style="display:none;">
        <div class="quiz-content">
            <div id="section-title" class="section-title"></div>
            <div class="timer" id="timer">30</div>
            <div class="timer-bar" id="timer-bar"></div>
            <div id="question-container"></div>
            <div class="answers" id="answers-container"></div>
        </div>
    </div>

    <button id="main-btn" onclick="nextQuestion()" style="display:none;">Далее →</button>

    <!-- Экран ожидания -->
    <div id="waiting-screen">
        <h2>Ты закончил тест!</h2>
        <div class="score-big" id="personal-score"></div>
        <p style="font-size:1.4em; margin:30px 0;">Ожидаем, пока все участники закончат...</p>
        <p style="opacity:0.7;">Не закрывай страницу</p>
    </div>

    <!-- Финальный экран -->
    <div id="final-screen">
        <h2>🏆 Итоговая таблица лидеров</h2>
        <p id="winner-announce" style="font-size:1.8em; font-weight:700; margin:25px 0;"></p>
        <table id="leaderboard" style="width:100%; border-collapse:collapse; background:rgba(255,255,255,0.06); border-radius:16px; overflow:hidden;">
            <thead><tr><th style="padding:15px;">Место</th><th style="padding:15px;">Имя</th><th style="padding:15px;">Очки</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top:30px; padding:16px 50px; font-size:1.15em;">Начать заново</button>
    </div>
</div>

<!-- Кнопка организатора -->
<button id="organizer-btn" onclick="showFinalLeaderboard()">
    ✅ Все закончили — Показать победителя
</button>

<script>
// ==================== ПОЛНЫЙ СПИСОК ВОПРОСОВ ====================
const questions = [
    { section: "Разогрев", q: "Какое отчество у Никиты?", a: ["Иванович", "Евгеньевич", "Андреевич", "Николаевич"], c: 1 },
    { section: "Разогрев", q: "Как зовут маму Никиты?", a: ["Елена", "Ольга", "Евгения", "Светлана"], c: 2 },
    { section: "Разогрев", q: "В каком городе родился Никита?", a: ["Красноярск", "Краснодар", "Зеленоград", "Зеленогорск"], c: 3 },
    { section: "Разогрев", q: "Какого цвета глаза у именинника?", a: ["Карие", "Зелёные", "Голубые", "Красные"], c: 1 },
    { section: "Разогрев", q: "В каком году Никита переехал в Санкт-Петербург?", a: ["2014", "2015", "2016", "2017"], c: 0 },
    { section: "Разогрев", q: "Какая у Никиты профессия?", a: ["Программист", "Системный администратор", "Бизнес-аналитик", "Тестировщик"], c: 2 },
    { section: "Разогрев", q: "В какой школе учился Никита?", a: ["№ 172", "№ 175", "№ 176", "№ 174"], c: 3 },
    { section: "Разогрев", q: "Любимый цвет Никиты?", a: ["Синий", "Зелёный", "Красный", "Чёрный"], c: 1 },
    { section: "Разогрев", q: "Какой десерт Никита любит больше всего?", a: ["Эклер", "Медовик", "Фисташковый рулет", "Бланманже"], c: 3 },
    { section: "Разогрев", q: "Что Никита планирует делать, если оказывается один дома?", a: ["Наводить порядок", "Оценивать траты по участку", "Зовёт друзей играть в компьютер", "Готовить что-то необычное"], c: 2 },

    { section: "Ты действительно знаешь Никиту?", q: "Как выглядит идеальный вечер Никиты дома?", a: ["Смотреть фильм и готовить еду", "Играть в игры и пить пиво", "Спонтанная прогулка", "Лежать и ничего не делать"], c: 1 },
    { section: "Ты действительно знаешь Никиту?", q: "Где Никита чаще всего проводит выходные летом?", a: ["Ездит на рыбалку", "В барах", "В гостях", "На прогулках"], c: 0 },
    { section: "Ты действительно знаешь Никиту?", q: "Какой футбольный клуб (и болельщиков) Никита терпеть не может?", a: ["Тоттенхэм", "Ливерпуль", "Челси", "Все вместе взятые"], c: 3 },
    { section: "Ты действительно знаешь Никиту?", q: "Как Никита предпочитает отдыхать после рабочей недели летом?", a: ["С женой дома", "Игры с друзьями", "Поход с палаткой и рыбалка", "Долгий сон"], c: 2 },
    { section: "Ты действительно знаешь Никиту?", q: "Какая была первая машина Никиты?", a: ["Жигули", "Toyota", "Volkswagen", "Škoda"], c: 3 },
    { section: "Ты действительно знаешь Никиту?", q: "Что Никита готовит лучше всего?", a: ["Пасту", "Супы", "Рыбу", "Шашлык"], c: 3 },
    { section: "Ты действительно знаешь Никиту?", q: "Где Никита познакомился с Лизой?", a: ["В парке", "На вписке у друзей", "В баре", "На сайте знакомств"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Как Никита выбирает вечерние планы?", a: ["Выйти куда-то погулять", "Остаться дома", "Позвать друзей", "Пойти на тренировку"], c: 1 },
    { section: "Ты действительно знает Никиту?", q: "Сколько полных лет Марселю (собака Никиты)?", a: ["5 лет", "10 лет", "9 лет", "7 лет"], c: 2 },
    { section: "Ты действительно знаешь Никиту?", q: "Именинник — настоящий любитель мандаринов! Если один мандарин весит 50 г, сколько мандаринов «весит» именинник? (Подсказка: попробуйте угадать его вес и посчитать!)", a: ["1 860", "930", "1 500", "2 000"], c: 0 },
    { section: "Ты действительно знает Никиту?", q: "Какой фильм Никита может пересматривать бесконечно?", a: ["«Интерстеллар»", "«Матрица»", "«Бойцовский клуб»", "«Такси»"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Какие кружки посещал в детстве?", a: ["Кройки и шитья", "Художественная школа", "Плавание", "Музыкальная школа"], c: 1 },
    { section: "Ты действительно знает Никиту?", q: "Что Никита скажет после тяжёлого дня?", a: ["«Надо проветриться»", "«Дома есть пиво?»", "«Надо сыграть пару каток»", "«Хоть бы прилечь за весь день»"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Если Никита с женой договорился ехать в зал, но она передумала, что он сделает?", a: ["Уговорит ехать", "Поедет один", "Не поедет и останется дома", "Рассердится и уйдёт гулять"], c: 2 },

    { section: "Финал. Всё или ничего", q: "Что способно вывести Никиту из себя быстрее всего?", a: ["Медленные люди", "Что-то лежит не на своём месте", "Глупые вопросы", "Арсенал проиграл"], c: 1 },
    { section: "Финал. Всё или ничего", q: "Что Никита делает первым делом, когда выезжает на природу?", a: ["Сразу устанавливает палатку", "Находит лучшее место для рыбалки", "Разжигает костёр", "Достаёт пиво"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Если Никита выиграл пять миллионов рублей, что он сделает?", a: ["Купит жене машину", "Закроет часть ипотеки", "Поедет путешествовать", "Инвестирует"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Сколько стран посетил Никита?", a: ["7", "8", "9", "10"], c: 2 },
    { section: "Финал. Всё или ничего", q: "Какие страны Никита посетил за последние 5 лет (зарубежные)?", a: ["Китай, Турция, Тайланд, Катар, Египет", "Шри-Ланка, Египет, Турция, Тайланд, Вьетнам", "Турция, Тайланд, Япония, КНДР, Египет", "Тайланд, Иран, Вьетнам, Казахстан, Турция"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Где была первая зарубежная поездка Никиты?", a: ["Китай", "Германия", "Турция", "Таиланд"], c: 0 }
];

let currentQuestion = 0;
let score = 0;
let playerName = '';
let allResults = [];

function startQuiz() {
    playerName = document.getElementById('playerName').value.trim();
    if (!playerName) { alert("Пожалуйста, введи своё имя ✨"); return; }

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    currentQuestion = 0;
    score = 0;
    showQuestion();
}

function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('section-title').textContent = q.section;
    document.getElementById('question-container').innerHTML = `<strong>Вопрос ${currentQuestion + 1} из ${questions.length}</strong><br>${q.q}`;

    const container = document.getElementById('answers-container');
    container.innerHTML = '';
    q.a.forEach((answer, index) => {
        const btn = document.createElement('div');
        btn.className = 'answer-btn';
        btn.textContent = answer;
        btn.onclick = () => selectAnswer(index, btn);
        container.appendChild(btn);
    });

    // Таймер
    let timeLeft = (currentQuestion === 9 || currentQuestion === 29) ? 60 : 30;
    document.getElementById('timer').textContent = timeLeft;
    document.getElementById('timer-bar').style.width = '100%';
    document.getElementById('timer-bar').style.background = '#22c55e';

    const timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;
        const percent = (timeLeft / ((currentQuestion === 9 || currentQuestion === 29) ? 60 : 30)) * 100;
        document.getElementById('timer-bar').style.width = percent + '%';
        if (timeLeft <= 10) document.getElementById('timer-bar').style.background = '#ef4444';
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            autoNext();
        }
    }, 1000);

    window.currentTimer = timerInterval;
    document.getElementById('main-btn').style.display = 'none';
}

function selectAnswer(selectedIndex, selectedBtn) {
    if (window.currentTimer) clearInterval(window.currentTimer);
    const correctIndex = questions[currentQuestion].c;
    const allBtns = document.querySelectorAll('.answer-btn');
    allBtns.forEach((btn, i) => {
        btn.style.pointerEvents = 'none';
        if (i === correctIndex) btn.classList.add('correct');
        if (i === selectedIndex && i !== correctIndex) btn.classList.add('wrong');
    });
    if (selectedIndex === correctIndex) score++;
    document.getElementById('main-btn').style.display = 'block';
}

function autoNext() {
    const allBtns = document.querySelectorAll('.answer-btn');
    allBtns.forEach(btn => btn.style.pointerEvents = 'none');
    document.getElementById('main-btn').style.display = 'block';
}

function nextQuestion() {
    if (window.currentTimer) clearInterval(window.currentTimer);
    currentQuestion++;
    if (currentQuestion < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('main-btn').style.display = 'none';
    document.getElementById('waiting-screen').style.display = 'block';
    document.getElementById('personal-score').textContent = `${score} / ${questions.length}`;

    allResults.push({ name: playerName, score: score });
}

function showFinalLeaderboard() {
    document.getElementById('waiting-screen').style.display = 'none';
    document.getElementById('final-screen').style.display = 'block';

    const tbody = document.querySelector('#leaderboard tbody');
    tbody.innerHTML = '';

    allResults.sort((a, b) => b.score - a.score);
    const maxScore = allResults[0].score;

    allResults.forEach((p, i) => {
        const row = document.createElement('tr');
        if (p.score === maxScore) row.style.background = 'linear-gradient(90deg, #ffd93d, #ff6b6b)';
        row.innerHTML = `<td style="padding:15px;">${i+1}</td><td style="padding:15px;">${p.name}</td><td style="padding:15px; font-weight:bold;">${p.score}</td>`;
        tbody.appendChild(row);
    });

    const winners = allResults.filter(p => p.score === maxScore);
    const text = winners.length === 1 
        ? `🏆 Победитель — <b>${winners[0].name}</b>!`
        : `🏆 Победители: ${winners.map(w => w.name).join(', ')}`;
    document.getElementById('winner-announce').innerHTML = text;
}
</script>
</body>
</html>
