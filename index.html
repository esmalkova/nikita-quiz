<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз для Никиты 🎂 | Насколько хорошо ты его знаешь?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        :root { --primary: #6b46c1; --accent: #ff6b6b; }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 640px;
            width: 100%;
            margin: 20px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        header {
            background: linear-gradient(90deg, var(--primary), #9f7aea);
            padding: 25px;
            text-align: center;
        }
        h1 { margin: 0; font-size: 2.3em; font-weight: 700; }
        .subtitle { font-size: 1.15em; opacity: 0.9; margin-top: 8px; }
        .progress-container { height: 6px; background: rgba(255,255,255,0.1); }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            width: 0%;
            transition: width 0.4s ease;
        }
        .section-title {
            text-align: center;
            font-size: 1.35em;
            margin: 20px 0 12px;
            color: #ffd93d;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
        .quiz-content { padding: 30px; }
        #question-container {
            font-size: 1.32em;
            line-height: 1.45;
            margin-bottom: 28px;
            min-height: 85px;
        }
        .answers { display: flex; flex-direction: column; gap: 14px; }
        .answer-btn {
            padding: 17px 22px;
            font-size: 1.1em;
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        .answer-btn:hover { background: rgba(255,255,255,0.2); transform: translateX(10px); }
        .answer-btn.correct { background: #22c55e; border-color: #86efac; color: white; animation: pop 0.4s ease; }
        .answer-btn.wrong { background: #ef4444; border-color: #f87171; color: white; }
        @keyframes pop { 0% { transform: scale(0.94); } 60% { transform: scale(1.06); } 100% { transform: scale(1); } }
        button#main-btn {
            margin-top: 30px;
            width: 100%;
            padding: 17px;
            font-size: 1.25em;
            font-weight: 600;
            background: var(--accent);
            border: none;
            border-radius: 16px;
            color: white;
            cursor: pointer;
        }
        #result-screen, #leaderboard-screen { padding: 40px 30px; text-align: center; display: none; }
        .score-big { font-size: 5em; font-weight: 700; color: #ffd93d; line-height: 1; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; margin: 25px 0; background: rgba(255,255,255,0.06); border-radius: 16px; overflow: hidden; }
        th, td { padding: 15px 18px; text-align: left; }
        th { background: rgba(255,255,255,0.12); }
        tr:nth-child(even) { background: rgba(255,255,255,0.04); }
        .winner { background: linear-gradient(90deg, #ffd93d, #ff6b6b) !important; color: #1a1a2e; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Квиз для Никиты 🎉</h1>
        <p class="subtitle">Насколько хорошо ты его знаешь?</p>
    </header>
    <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>

    <div id="start-screen" class="quiz-content">
        <input type="text" id="playerName" placeholder="Твоё имя" style="width:100%; padding:18px; font-size:1.15em; border-radius:16px; border:none; margin-bottom:20px; box-sizing:border-box;">
        <button onclick="startQuiz()" style="width:100%; padding:18px; font-size:1.25em; border-radius:16px;">Начать квиз!</button>
    </div>

    <div id="quiz-screen" style="display:none;">
        <div class="quiz-content">
            <div id="section-title" class="section-title"></div>
            <div id="question-container"></div>
            <div class="answers" id="answers-container"></div>
            <button id="main-btn" onclick="nextQuestion()" style="display:none;">Далее →</button>
        </div>
    </div>

    <div id="result-screen">
        <h2>Результат, <span id="player-name-result"></span>!</h2>
        <div class="score-big" id="score"></div>
        <p id="result-message" style="font-size:1.35em; line-height:1.5;"></p>
        <button onclick="showLeaderboard()" style="margin-top:35px; padding:16px 50px; font-size:1.15em;">Посмотреть таблицу лидеров 🏆</button>
    </div>

    <div id="leaderboard-screen">
        <h2>🏆 Таблица лидеров</h2>
        <table id="leaderboard-table">
            <thead><tr><th>Место</th><th>Имя</th><th>Правильных ответов</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top:30px; padding:16px 50px; font-size:1.15em;">Начать заново</button>
    </div>
</div>

<script>
// ==================== ИСПРАВЛЕННЫЕ ВОПРОСЫ ====================
const questions = [
    // 1-10 Разогрев
    { section: "Разогрев", q: "Какое отчество у Никиты?", a: ["Иванович", "Евгеньевич", "Андреевич", "Николаевич"], c: 1 },
    { section: "Разогрев", q: "Как зовут маму Никиты?", a: ["Елена", "Ольга", "Евгения", "Светлана"], c: 2 },
    { section: "Разогрев", q: "В каком городе родился Никита?", a: ["Красноярск", "Краснодар", "Зеленоград", "Зеленогорск"], c: 3 },
    { section: "Разогрев", q: "Какого цвета глаза у именинника?", a: ["Карие", "Зелёные", "Голубые", "Красные"], c: 1 },
    { section: "Разогрев", q: "В каком году Никита переехал в Санкт-Петербург?", a: ["2014", "2015", "2016", "2017"], c: 0 },
    { section: "Разогрев", q: "Какая у Никиты профессия?", a: ["Программист", "Системный администратор", "Бизнес-аналитик", "Тестировщик"], c: 2 },
    { section: "Разогрев", q: "В какой школе учился Никита?", a: ["№ 172", "№ 175", "№ 176", "№ 174"], c: 3 },
    { section: "Разогрев", q: "Любимый цвет Никиты?", a: ["Синий", "Зелёный", "Красный", "Чёрный"], c: 1 },
    { section: "Разогрев", q: "Какой десерт Никита любит больше всего?", a: ["Эклер", "Медовик", "Фисташковый рулет", "Бланманже"], c: 3 },
    { section: "Разогрев", q: "Что Никита планирует делать, если оказывается один дома?", a: ["Наводить порядок", "Оценивать траты по участку", "Зовёт друзей играть в компьютер", "Готовить что-то необычное"], c: 2 },

    // 11-24 Ты действительно знаешь Никиту?
    { section: "Ты действительно знаешь Никиту?", q: "Как выглядит идеальный вечер Никиты дома?", a: ["Смотреть фильм и готовить еду", "Играть в игры и пить пиво", "Спонтанная прогулка", "Лежать и ничего не делать"], c: 1 },
    { section: "Ты действительно знаешь Никиту?", q: "Где Никита чаще всего проводит выходные летом?", a: ["Ездит на рыбалку", "В барах", "В гостях", "На прогулках"], c: 0 },
    { section: "Ты действительно знаешь Никиту?", q: "Какой футбольный клуб (и болельщиков) Никита терпеть не может?", a: ["Тоттенхэм", "Ливерпуль", "Челси", "Все вместе взятые"], c: 3 },
    { section: "Ты действительно знаешь Никиту?", q: "Как Никита предпочитает отдыхать после рабочей недели летом?", a: ["С женой дома", "Игры с друзьями", "Поход с палаткой и рыбалка", "Долгий сон"], c: 2 },
    { section: "Ты действительно знаешь Никиту?", q: "Какая была первая машина Никиты?", a: ["Жигули", "Toyota", "Volkswagen", "Škoda"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Что Никита готовит лучше всего?", a: ["Пасту", "Супы", "Рыбу", "Шашлык"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Где Никита познакомился с Лизой?", a: ["В парке", "На вписке у друзей", "В баре", "На сайте знакомств"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Как Никита выбирает вечерние планы?", a: ["Выйти куда-то погулять", "Остаться дома", "Позвать друзей", "Пойти на тренировку"], c: 1 },
    { section: "Ты действительно знает Никиту?", q: "Сколько полных лет Марселю (собака Никиты)?", a: ["5 лет", "10 лет", "9 лет", "7 лет"], c: 2 },
    { section: "Ты действительно знает Никиту?", q: "Сколько мандаринов весит именинник? (вес Никиты — 93 кг, один мандарин ≈ 50 г)", a: ["715", "750", "775", "800"], c: 0 },
    { section: "Ты действительно знает Никиту?", q: "Какой фильм Никита может пересматривать бесконечно?", a: ["«Интерстеллар»", "«Матрица»", "«Бойцовский клуб»", "«Такси»"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Какие кружки посещал в детстве?", a: ["Кройки и шитья", "Художественная школа", "Плавание", "Музыкальная школа"], c: 1 },
    { section: "Ты действительно знает Никиту?", q: "Что Никита скажет после тяжёлого дня?", a: ["«Надо проветриться»", "«Дома есть пиво?»", "«Надо сыграть пару каток»", "«Хоть бы прилечь за весь день»"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Если Никита с женой договорился ехать в зал, но она передумала, что он сделает?", a: ["Уговорит ехать", "Поедет один", "Не поедет и останется дома", "Рассердится и уйдёт гулять"], c: 2 },

    // 25-30 Финал
    { section: "Финал. Всё или ничего", q: "Что способно вывести Никиту из себя быстрее всего?", a: ["Медленные люди", "Что-то лежит не на своём месте", "Глупые вопросы", "Арсенал проиграл"], c: 1 },
    { section: "Финал. Всё или ничего", q: "Что Никита делает первым делом, когда выезжает на природу?", a: ["Сразу устанавливает палатку", "Находит лучшее место для рыбалки", "Разжигает костёр", "Достаёт пиво"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Если Никита выиграл пять миллионов рублей, что он сделает?", a: ["Купит жене машину", "Закроет часть ипотеки", "Поедет путешествовать", "Инвестирует"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Сколько стран посетил Никита?", a: ["7", "8", "9", "10"], c: 2 },
    { section: "Финал. Всё или ничего", q: "Какие страны Никита посетил за последние 5 лет (зарубежные)?", a: ["Китай, Турция, Тайланд, Катар, Египет", "Шри-Ланка, Египет, Турция, Тайланд, Вьетнам", "Турция, Тайланд, Япония, КНДР, Египет", "Тайланд, Иран, Вьетнам, Казахстан, Турция"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Где была первая зарубежная поездка Никиты?", a: ["Китай", "Германия", "Турция", "Таиланд"], c: 0 }
];

let currentQuestion = 0;
let score = 0;
let playerName = '';
let players = [];

function startQuiz() {
    playerName = document.getElementById('playerName').value.trim();
    if (!playerName) { alert("Пожалуйста, введи своё имя ✨"); return; }
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    currentQuestion = 0; score = 0;
    showQuestion();
}

function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('section-title').textContent = q.section;
    document.getElementById('question-container').innerHTML = `<strong>Вопрос ${currentQuestion + 1} из ${questions.length}</strong><br>${q.q}`;

    const container = document.getElementById('answers-container');
    container.innerHTML = '';
    q.a.forEach((answer, index) => {
        const btn = document.createElement('div');
        btn.className = 'answer-btn';
        btn.textContent = answer;
        btn.onclick = () => selectAnswer(index, btn);
        container.appendChild(btn);
    });
    document.getElementById('main-btn').style.display = 'none';
    updateProgress();
}

function selectAnswer(selectedIndex, selectedBtn) {
    const correctIndex = questions[currentQuestion].c;
    const allBtns = document.querySelectorAll('.answer-btn');
    allBtns.forEach((btn, i) => {
        btn.style.pointerEvents = 'none';
        if (i === correctIndex) btn.classList.add('correct');
        if (i === selectedIndex && i !== correctIndex) btn.classList.add('wrong');
    });
    if (selectedIndex === correctIndex) score++;
    document.getElementById('main-btn').style.display = 'block';
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) showQuestion();
    else showResult();
}

function updateProgress() {
    const percent = Math.round(((currentQuestion) / questions.length) * 100);
    document.getElementById('progress-bar').style.width = percent + '%';
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('player-name-result').textContent = playerName;
    document.getElementById('score').textContent = `${score} / ${questions.length}`;

    const percent = Math.round((score / questions.length) * 100);
    let msg = percent === 100 ? `🔥 Абсолютный чемпион! Ты знаешь Никиту на 100%!` :
              percent >= 85 ? `🎉 Потрясающий результат! Ты настоящий близкий друг!` :
              percent >= 70 ? `👍 Отлично! Никита будет впечатлён!` :
              percent >= 50 ? `🙂 Неплохо, но можно узнать ещё лучше 😉` : `😅 Пора чаще общаться с Никитой!`;
    document.getElementById('result-message').innerHTML = msg;
    players.push({ name: playerName, score: score });
}

function showLeaderboard() {
    document.getElementById('result-screen').style.display = 'none';
    document.getElementById('leaderboard-screen').style.display = 'block';
    const tbody = document.querySelector('#leaderboard-table tbody');
    tbody.innerHTML = '';
    players.sort((a, b) => b.score - a.score);
    players.forEach((p, i) => {
        const row = document.createElement('tr');
        if (i === 0) row.classList.add('winner');
        row.innerHTML = `<td>${i+1}</td><td>${p.name}</td><td><strong>${p.score} из ${questions.length}</strong></td>`;
        tbody.appendChild(row);
    });
}
</script>
</body>
</html>
