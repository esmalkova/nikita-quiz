<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Квиз для Никиты</title>
<style>
  body { font-family: Arial; max-width: 600px; margin: auto; padding: 20px; }
  .answers button { display: block; margin: 5px 0; width: 100%; font-size: 1em; }
  #result { font-size: 1.5em; font-weight: bold; margin-top: 20px; }
  input { padding: 5px; font-size: 1em; }
  button { padding: 10px; font-size: 1em; cursor: pointer; }
</style>
</head>
<body>

<h1>Квиз для Никиты</h1>
<div id="quiz-container">
  <label>Ваше имя: <input type="text" id="playerName" /></label>
  <button id="startBtn">Начать квиз</button>
  
  <div id="question-container" style="display:none;"></div>
  <div class="answers" id="answers-container"></div>
  <button id="next-btn" style="display:none;">Следующий вопрос</button>
</div>

<div id="result" style="display:none;"></div>

<script>
const questions = [
  { question: "Какое отчество у Никиты?", answers: ["Иванович","Евгеньевич","Андреевич","Николаевич"], correct: 1 },
  { question: "Как зовут маму Никиты?", answers: ["Ольга","Екатерина","Марина","Татьяна"], correct: 2 },
  { question: "Какой любимый цвет Никиты?", answers: ["Синий","Красный","Зелёный","Фиолетовый"], correct: 0 },
  { question: "Где Никита родился?", answers: ["Москва","Питер","Казань","Новосибирск"], correct: 1 }
  // Можно добавить все остальные вопросы
];

let currentQuestion = 0;
let score = 0;
let playerName = '';

const startBtn = document.getElementById("startBtn");
const questionContainer = document.getElementById("question-container");
const answersContainer = document.getElementById("answers-container");
const nextBtn = document.getElementById("next-btn");
const resultDiv = document.getElementById("result");
const nameInput = document.getElementById("playerName");

startBtn.onclick = () => {
  playerName = nameInput.value.trim();
  if (!playerName) { alert("Введите имя!"); return; }
  startBtn.style.display = "none";
  nameInput.style.display = "none";
  showQuestion();
}

function showQuestion() {
  const q = questions[currentQuestion];
  questionContainer.style.display = "block";
  questionContainer.innerText = Вопрос ${currentQuestion+1}: ${q.question};
  answersContainer.style.display = "block";
  answersContainer.innerHTML = "";
  q.answers.forEach((ans, index) => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => selectAnswer(index);
    answersContainer.appendChild(btn);
  });
  nextBtn.style.display = "none";
}

function selectAnswer(index) {
  const correctIndex = questions[currentQuestion].correct;
  if (index === correctIndex) score++;
  nextBtn.style.display = "inline-block";
}

nextBtn.onclick = () => {
  currentQuestion++;
  if (currentQuestion < questions.length) showQuestion();
  else showResult();
};

function showResult() {
  questionContainer.style.display = "none";
  answersContainer.style.display = "none";
  nextBtn.style.display = "none";
  resultDiv.style.display = "block";
  resultDiv.innerText = ${playerName}, вы набрали ${score} из ${questions.length} очков!;
}
</script>

</body>
</html>
