<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Знаешь ли ты Никиту на 100%?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0c0a1f, #1a1740, #2a2659);
            color: #fff;
            min-height: 100vh;
        }
        .container {
            max-width: 640px;
            width: 100%;
            margin: 15px auto;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.12);
        }
        header {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6, #1e40af);
            padding: 30px 20px 25px;
            text-align: center;
            position: relative;
        }
        .king-container {
            margin: 0 auto 15px;
            width: 220px;
            height: 280px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            animation: kingGlow 4s ease-in-out infinite;
        }
        .king {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .king-container:hover .king {
            transform: scale(1.05);
        }
        @keyframes kingGlow {
            0%, 100% { box-shadow: 0 15px 40px rgba(59, 130, 246, 0.6); }
            50% { box-shadow: 0 15px 50px rgba(165, 180, 252, 0.9); }
        }

        h1 {
            margin: 10px 0 0;
            font-family: 'Playfair Display', serif;
            font-size: 2.55em;
            font-weight: 700;
            text-shadow: 0 6px 25px rgba(0,0,0,0.6);
        }
        .subtitle {
            font-size: 1.32em;
            margin-top: 12px;
            opacity: 0.95;
        }

        .progress-container {
            height: 8px;
            background: rgba(255,255,255,0.1);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #a5b4fc, #c4d0ff);
            width: 0%;
            transition: width 0.4s ease;
            box-shadow: 0 0 12px #a5b4fc;
        }

        .quiz-content {
            padding: 25px 30px 125px;
            text-align: center;
        }
        #section-title { font-size: 1.1em; color: #a5b4fc; margin-bottom: 8px; font-weight: 600; }
        #question-number { font-size: 0.98em; color: #94a3b8; margin-bottom: 12px; }
        #question-container {
            font-size: 1.42em;
            line-height: 1.48;
            margin: 0 auto;
            max-width: 520px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .timer {
            font-size: 2.35em;
            font-weight: 700;
            color: #e0f2fe;
            margin: 20px 0 25px;
            text-shadow: 0 0 15px #bae6fd;
        }

        .answers { display: flex; flex-direction: column; gap: 16px; }
        .answer-btn {
            padding: 19px 24px;
            font-size: 1.14em;
            background: rgba(255,255,255,0.09);
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }
        .answer-btn:hover { background: rgba(255,255,255,0.18); transform: translateX(12px); border-color: #bae6fd; }
        .answer-btn.correct { background: #4ade80; color: #0f172a; }
        .answer-btn.wrong { background: #f87171; color: white; }

        #main-btn {
            position: fixed;
            bottom: 22px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 580px;
            padding: 19px;
            font-size: 1.32em;
            font-weight: 700;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border: none;
            border-radius: 20px;
            color: white;
            box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
            z-index: 90;
        }

        #organizer-btn {
            position: fixed;
            top: 18px;
            right: 18px;
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.18);
            border: none;
            border-radius: 50%;
            color: #bae6fd;
            font-size: 26px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Главная страница с фото Никиты -->
    <div id="start-screen">
        <header>
            <div class="king-container">
                <img src="https://i.imgur.com/bV7un.gif" alt="Никита" class="king"> 
                <!-- Если хочешь использовать свою фотографию вместо гифки, замени ссылку выше на прямую ссылку на фото -->
            </div>
            <h1>Знаешь ли ты Никиту на 100%?</h1>
            <p class="subtitle">Юбилейный королевский тест 🎂👑</p>
        </header>
        <div class="quiz-content">
            <input type="text" id="playerName" placeholder="Твоё имя" 
                   style="width:100%; padding:19px; font-size:1.2em; border-radius:18px; border:none; margin-bottom:25px; box-sizing:border-box;">
            <button onclick="startQuiz()" style="width:100%; padding:19px; font-size:1.3em; border-radius:18px; background:linear-gradient(90deg,#3b82f6,#60a5fa); color:white; font-weight:700;">
                Начать тест
            </button>
        </div>
    </div>

    <!-- Остальная часть квиза (вопросы, ожидание, финал) -->
    <div id="quiz-screen" style="display:none;">
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div class="quiz-content">
            <div id="section-title" class="section-title"></div>
            <div id="question-number"></div>
            <div id="question-container"></div>
            <div class="timer" id="timer">30</div>
            <div class="answers" id="answers-container"></div>
        </div>
    </div>

    <button id="main-btn" onclick="nextQuestion()" style="display:none;">Далее →</button>

    <div id="waiting-screen" style="display:none; padding:70px 30px; text-align:center;">
        <h2>Ты отлично справился!</h2>
        <div class="score-big" id="personal-score"></div>
        <p style="font-size:1.45em; margin:35px 0;">Ожидаем остальных участников...</p>
    </div>

    <div id="final-screen" style="display:none; padding:70px 30px; text-align:center;">
        <h2>🏆 Итоговая таблица лидеров</h2>
        <p id="winner-announce" style="font-size:1.85em; font-weight:700; margin:30px 0; color:#bae6fd;"></p>
        <table id="leaderboard" style="width:100%; border-collapse:collapse; background:rgba(255,255,255,0.08); border-radius:20px; overflow:hidden;">
            <thead><tr><th style="padding:16px;">Место</th><th style="padding:16px;">Имя</th><th style="padding:16px;">Очки</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top:35px; padding:17px 55px; font-size:1.2em; border-radius:18px; background:#60a5fa; color:white; font-weight:700;">
            Начать заново
        </button>
    </div>
</div>

<button id="organizer-btn" onclick="showFinalLeaderboard()">✓</button>

</body>
</html>
