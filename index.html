<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Квиз Никита</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #fff8dc;
  margin: 0;
  padding: 0;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
  color: #ff4500;
}

#question {
  font-size: 20px;
  margin: 20px 0;
}

.button {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  font-size: 16px;
  border-radius: 8px;
  border: none;
  background: #87cefa;
}

#timer {
  text-align: center;
  font-size: 20px;
}

#final {
  text-align: center;
  font-size: 24px;
  color: green;
}
</style>
</head>

<body>

<div class="container">
<h1>Кто лучше всех знает Никиту?</h1>

<div id="timer">30</div>
<div id="question"></div>
<div id="answers"></div>
<div id="final"></div>

</div>

<script>

const questions = [

{q:"Какое отчество у Никиты?",a:["Иванович","Евгеньевич","Андреевич","Петрович"],c:1},
{q:"Как зовут маму Никиты?",a:["Елена","Ольга","Евгения","Светлана"],c:2},
{q:"В каком городе родился Никита?",a:["Красноярск","Краснодар","Железногорск","Зеленогорск"],c:3},
{q:"В каком году Никита переехал в Санкт-Петербург?",a:["2014","2016","2018","2020"],c:0},
{q:"Какая у Никиты профессия?",a:["Программист","Системный администратор","Бизнес-аналитик","Тестировщик"],c:2},
{q:"В какой школе учился Никита?",a:["№172","№175","№176","№174"],c:3},
{q:"Любимый цвет Никиты?",a:["Синий","Зеленый","Красный","Черный"],c:1},
{q:"Какой кофе Никита любит?",a:["Американо","Капучино","Латте","Флэт уайт"],c:3},
{q:"Какой фильм пересматривает?",a:["Интерстеллар","Матрица","Бойцовский клуб","Такси"],c:3},
{q:"Если один дома?",a:["Танцует","Считает финансы","Играет","Смотрит Shorts"],c:2},

{q:"Что делает после работы?",a:["Футбол","Игры","Пиво","Спать"],c:0},
{q:"Идеальный вечер?",a:["Фильм","Игры и пиво","Прогулка","Ничего"],c:1},
{q:"Лето?",a:["Рыбалка","Бар","Дома","Зал"],c:0},
{q:"Интернет сломался?",a:["Ждёт","Перезапуск","Злится","Звонит провайдеру"],c:3},
{q:"Любит в футболе?",a:["Тактики","Команда","Арсенал","Удары"],c:2},
{q:"Как объясняет?",a:["Кратко","С примерами","Схемы","Сложно"],c:1},
{q:"Нелюбимый клуб?",a:["Тоттенхэм","Ливерпуль","МЮ","Все"],c:3},
{q:"Выходные?",a:["Дома","Игры","Палатка и рыбалка","Сон"],c:2},
{q:"Марсель встречает?",a:["Лежит","Прыгает","Уходит","Прячется"],c:1},
{q:"После тяжёлого дня?",a:["Фильм","Пиво","Игры","Лежать"],c:3},

{q:"Первая машина?",a:["ВАЗ","Toyota","BMW","Skoda"],c:3},
{q:"На отдых берёт?",a:["Удочка","Пиво","Еда","Всё"],c:3},
{q:"Готовит?",a:["Стейк","Пицца","Суши","Гриль"],c:3},
{q:"С друзьями дома?",a:["Футбол","Комп","Настолки","Выезды"],c:2},
{q:"Музыка?",a:["Поп","Рок","2000-е","Любая энергичная"],c:3},
{q:"Планы?",a:["Выйти","Дом","Друзья","Футбол"],c:3},
{q:"Бесит?",a:["Интернет","Глупые вопросы","Отвлекают","Проигрыш"],c:1},
{q:"Вождение?",a:["Норм","Лучший","Средне","Профи"],c:1},
{q:"Миллион?",a:["Вложит","Купит","Путешествие","Отложит"],c:0},
{q:"После дня?",a:["Отдых","Пиво","Игры","Лечь"],c:3},

{q:"Жена передумала идти в зал?",a:["Уговорит","Один","Останется","Уйдёт"],c:2},

{q:"Что бесит быстрее всего?",a:["Интернет","Ручка","Пиво","Игры"],c:0},
{q:"Стратегия в настолках?",a:["Атака","Защита","Обманывает","Случайно"],c:2},
{q:"На рыбалке сначала?",a:["Палатка","Место","Костёр","Пиво"],c:1},
{q:"Секретный талант?",a:["Жонглирует","Мемы","Готовка","Футбол"],c:1}

];

let i = 0;
let score = 0;
let time = 30;
let interval;

function showQ(){
  if(i >= questions.length){
    document.getElementById("final").innerHTML = "🎉 Результат: " + score + "/" + questions.length;
    return;
  }

  time = 30;
  document.getElementById("timer").innerText = time;
  document.getElementById("question").innerText = questions[i].q;

  let html = "";
  questions[i].a.forEach((ans, index)=>{
    html += `<button class="button" onclick="answer(${index})">${ans}</button>`;
  });

  document.getElementById("answers").innerHTML = html;

  clearInterval(interval);
  interval = setInterval(()=>{
    time--;
    document.getElementById("timer").innerText = time;

    if(time <= 0){
      clearInterval(interval);
      i++;
      showQ();
    }
  },1000);
}

function answer(x){
  if(x === questions[i].c) score++;
  i++;
  showQ();
}

showQ();

</script>

</body>
</html>
