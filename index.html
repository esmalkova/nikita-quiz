<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Знаешь ли ты Никиту на 100%?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0c0a1f, #1a1740, #2a2659);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            overflow: hidden;
        }

        /* Стартовый экран */
        #start-screen {
            text-align: center;
            padding: 50px 25px 70px;
        }
        #start-screen h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.4em;
            font-weight: 700;
            margin: 0 0 15px;
            background: linear-gradient(90deg, #facc15, #fef08c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        #start-screen .subtitle {
            font-size: 1.25em;
            margin-bottom: 45px;
            opacity: 0.95;
        }
        #playerName {
            width: 100%;
            padding: 18px;
            font-size: 1.2em;
            border-radius: 18px;
            border: none;
            margin-bottom: 25px;
            box-sizing: border-box;
            background: rgba(255,255,255,0.95);
            color: #1e2937;
        }
        #start-btn {
            width: 100%;
            padding: 20px;
            font-size: 1.35em;
            font-weight: 700;
            border-radius: 18px;
            border: none;
            background: linear-gradient(90deg, #eab308, #facc15);
            color: #1e2937;
            box-shadow: 0 10px 30px rgba(234, 179, 8, 0.6);
            cursor: pointer;
        }

        /* Квиз */
        .progress-container {
            height: 8px;
            background: rgba(255,255,255,0.1);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #60a5fa, #93c5fd);
            width: 0%;
            transition: width 0.4s ease;
        }

        .quiz-content {
            padding: 25px 25px 140px;
            text-align: center;
        }
        #section-title {
            font-size: 1.1em;
            color: #93c5fd;
            margin-bottom: 8px;
        }
        #question-number {
            font-size: 1em;
            color: #cbd5e1;
            margin-bottom: 12px;
        }
        #question-container {
            font-size: 1.38em;
            line-height: 1.5;
            margin: 0 auto 30px;
            min-height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .timer {
            font-size: 2.3em;
            font-weight: 700;
            color: #e0f2fe;
            margin: 15px 0 25px;
        }

        .answers {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .answer-btn {
            padding: 18px 22px;
            font-size: 1.12em;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.25);
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            min-height: 58px;
            display: flex;
            align-items: center;
        }
        .answer-btn:hover {
            background: rgba(255,255,255,0.22);
            transform: translateX(8px);
        }
        .answer-btn.correct { background: #4ade80; color: #0f172a; }
        .answer-btn.wrong { background: #f87171; color: white; }

        #main-btn {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            padding: 18px;
            font-size: 1.3em;
            font-weight: 700;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border: none;
            border-radius: 18px;
            color: white;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.5);
            z-index: 90;
        }

        /* Скрытая кнопка организатора */
        #organizer-btn {
            position: fixed;
            top: 15px;
            right: 15px;
            width: 48px;
            height: 48px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            color: #bae6fd;
            font-size: 24px;
            cursor: pointer;
            z-index: 200;
        }

        /* Результаты */
        #waiting-screen, #final-screen {
            padding: 60px 25px;
            text-align: center;
            display: none;
        }
        .score-big {
            font-size: 4.8em;
            font-weight: 700;
            color: #bae6fd;
            margin: 20px 0;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- Стартовый экран -->
    <div id="start-screen">
        <header>
            <h1>Знаешь ли ты Никиту на 100%?</h1>
            <p class="subtitle">Юбилейный тест на настоящую дружбу 🎂</p>
        </header>
        <div class="quiz-content">
            <input type="text" id="playerName" placeholder="Твоё имя" 
                   style="width:100%; padding:20px; font-size:1.2em; border-radius:20px; border:none; margin-bottom:30px; box-sizing:border-box;">
            <button onclick="startQuiz()" id="start-btn">
                Начать квиз
            </button>
        </div>
    </div>

    <!-- Экран квиза -->
    <div id="quiz-screen" style="display:none;">
        <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
        <div class="quiz-content">
            <div id="section-title" class="section-title"></div>
            <div id="question-number"></div>
            <div id="question-container"></div>
            <div class="timer" id="timer">30</div>
            <div class="answers" id="answers-container"></div>
        </div>
    </div>

    <button id="main-btn" onclick="nextQuestion()" style="display:none;">Далее →</button>

    <!-- Экран ожидания -->
    <div id="waiting-screen" style="display:none;">
        <h2>Твой результат</h2>
        <div class="score-big" id="personal-score"></div>
        <p style="font-size:1.4em; margin:35px 0;">Ожидаем остальных участников...</p>
    </div>

    <!-- Финальный экран -->
    <div id="final-screen" style="display:none;">
        <h2>🏆 Итоговая таблица лидеров</h2>
        <p id="winner-announce" style="font-size:1.8em; font-weight:700; margin:25px 0; color:#fcd34d;"></p>
        <table id="leaderboard" style="width:100%; border-collapse:collapse; background:rgba(255,255,255,0.08); border-radius:20px; overflow:hidden;">
            <thead><tr><th style="padding:16px;">Место</th><th style="padding:16px;">Имя</th><th style="padding:16px;">Очки</th></tr></thead>
            <tbody></tbody>
        </table>
        <button onclick="location.reload()" style="margin-top:35px; padding:18px 50px; font-size:1.2em; border-radius:18px; background:#60a5fa; color:white; font-weight:700;">
            Начать заново
        </button>
    </div>
</div>

<button id="organizer-btn" onclick="showFinalLeaderboard()">✓</button>

<script>
// ==================== ВОПРОСЫ ====================
const questions = [
    { section: "Разогрев", q: "Какое отчество у Никиты?", a: ["Иванович", "Евгеньевич", "Андреевич", "Николаевич"], c: 1 },
    { section: "Разогрев", q: "Как зовут маму Никиты?", a: ["Елена", "Ольга", "Евгения", "Светлана"], c: 2 },
    { section: "Разогрев", q: "В каком городе родился Никита?", a: ["Красноярск", "Краснодар", "Зеленоград", "Зеленогорск"], c: 3 },
    { section: "Разогрев", q: "Какого цвета глаза у именинника?", a: ["Карие", "Зелёные", "Голубые", "Красные"], c: 1 },
    { section: "Разогрев", q: "В каком году Никита переехал в Санкт-Петербург?", a: ["2014", "2015", "2016", "2017"], c: 0 },
    { section: "Разогрев", q: "Какая у Никиты профессия?", a: ["Программист", "Системный администратор", "Бизнес-аналитик", "Тестировщик"], c: 2 },
    { section: "Разогрев", q: "В какой школе учился Никита?", a: ["№ 172", "№ 175", "№ 176", "№ 174"], c: 3 },
    { section: "Разогрев", q: "Любимый цвет Никиты?", a: ["Синий", "Зелёный", "Красный", "Чёрный"], c: 1 },
    { section: "Разогрев", q: "Какой десерт Никита любит больше всего?", a: ["Эклер", "Медовик", "Фисташковый рулет", "Бланманже"], c: 3 },
    { section: "Разогрев", q: "Что Никита планирует делать, если оказывается один дома?", a: ["Наводить порядок", "Оценивать траты по участку", "Зовёт друзей играть в компьютер", "Готовить что-то необычное"], c: 2 },

    { section: "Ты действительно знаешь Никиту?", q: "Как выглядит идеальный вечер Никиты дома?", a: ["Смотреть фильм и готовить еду", "Играть в игры и пить пиво", "Спонтанная прогулка", "Лежать и ничего не делать"], c: 1 },
    { section: "Ты действительно знаешь Никиту?", q: "Где Никита чаще всего проводит выходные летом?", a: ["Ездит на рыбалку", "В барах", "В гостях", "На прогулках"], c: 0 },
    { section: "Ты действительно знает Никиту?", q: "Какой футбольный клуб (и болельщиков) Никита терпеть не может?", a: ["Тоттенхэм", "Ливерпуль", "Челси", "Все вместе взятые"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Как Никита предпочитает отдыхать после рабочей недели летом?", a: ["С женой дома", "Игры с друзьями", "Поход с палаткой и рыбалка", "Долгий сон"], c: 2 },
    { section: "Ты действительно знает Никиту?", q: "Какая была первая машина Никиты?", a: ["Жигули", "Toyota", "Volkswagen", "Škoda"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Что Никита готовит лучше всего?", a: ["Пасту", "Супы", "Рыбу", "Шашлык"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Где Никита познакомился с Лизой?", a: ["В парке", "На вписке у друзей", "В баре", "На сайте знакомств"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Как Никита выбирает вечерние планы?", a: ["Выйти куда-то погулять", "Остаться дома", "Позвать друзей", "Пойти на тренировку"], c: 1 },
    { section: "Ты действительно знает Никиту?", q: "Сколько полных лет Марселю (собака Никиты)?", a: ["5 лет", "10 лет", "9 лет", "7 лет"], c: 2 },
    { section: "Ты действительно знает Никиту?", q: "Именинник — настоящий любитель мандаринов! Если один мандарин весит 50 г, сколько мандаринов «весит» именинник? (Подсказка: попробуйте угадать его вес и посчитать!)", a: ["1 860", "930", "1 500", "2 000"], c: 0 },
    { section: "Ты действительно знает Никиту?", q: "Какой фильм Никита может пересматривать бесконечно?", a: ["«Интерстеллар»", "«Матрица»", "«Бойцовский клуб»", "«Такси»"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Какие кружки посещал в детстве?", a: ["Кройки и шитья", "Художественная школа", "Плавание", "Музыкальная школа"], c: 1 },
    { section: "Ты действительно знает Никиту?", q: "Что Никита скажет после тяжёлого дня?", a: ["«Надо проветриться»", "«Дома есть пиво?»", "«Надо сыграть пару каток»", "«Хоть бы прилечь за весь день»"], c: 3 },
    { section: "Ты действительно знает Никиту?", q: "Если Никита с женой договорился ехать в зал, но она передумала, что он сделает?", a: ["Уговорит ехать", "Поедет один", "Не поедет и останется дома", "Рассердится и уйдёт гулять"], c: 2 },

    { section: "Финал. Всё или ничего", q: "Что способно вывести Никиту из себя быстрее всего?", a: ["Медленные люди", "Что-то лежит не на своём месте", "Глупые вопросы", "Арсенал проиграл"], c: 1 },
    { section: "Финал. Всё или ничего", q: "Что Никита делает первым делом, когда выезжает на природу?", a: ["Сразу устанавливает палатку", "Находит лучшее место для рыбалки", "Разжигает костёр", "Достаёт пиво"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Если Никита выиграл пять миллионов рублей, что он сделает?", a: ["Купит жене машину", "Закроет часть ипотеки", "Поедет путешествовать", "Инвестирует"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Сколько стран посетил Никита?", a: ["7", "8", "9", "10"], c: 2 },
    { section: "Финал. Всё или ничего", q: "Какие страны Никита посетил за последние 5 лет (зарубежные)?", a: ["Китай, Турция, Тайланд, Катар, Египет", "Шри-Ланка, Египет, Турция, Тайланд, Вьетнам", "Турция, Тайланд, Япония, КНДР, Египет", "Тайланд, Иран, Вьетнам, Казахстан, Турция"], c: 0 },
    { section: "Финал. Всё или ничего", q: "Где была первая зарубежная поездка Никиты?", a: ["Китай", "Германия", "Турция", "Таиланд"], c: 0 }
];

let currentQuestion = 0;
let score = 0;
let playerName = '';
let allResults = [];

function startQuiz() {
    playerName = document.getElementById('playerName').value.trim();
    if (!playerName) { alert("Введите своё имя ✨"); return; }

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('quiz-screen').style.display = 'block';
    currentQuestion = 0;
    score = 0;
    showQuestion();
}

function showQuestion() {
    const q = questions[currentQuestion];
    document.getElementById('section-title').textContent = q.section;
    document.getElementById('question-number').innerHTML = `Вопрос <strong>${currentQuestion + 1}</strong> из ${questions.length}`;
    document.getElementById('question-container').innerHTML = q.q;

    const container = document.getElementById('answers-container');
    container.innerHTML = '';
    q.a.forEach((answer, index) => {
        const btn = document.createElement('div');
        btn.className = 'answer-btn';
        btn.textContent = answer;
        btn.onclick = () => selectAnswer(index, btn);
        container.appendChild(btn);
    });

    let timeLeft = (currentQuestion === 19 || currentQuestion === 29) ? 60 : 30;
    document.getElementById('timer').textContent = timeLeft;

    const timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;
        if (timeLeft <= 10) document.getElementById('timer').style.color = '#f87171';
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            autoNext();
        }
    }, 1000);

    window.currentTimer = timerInterval;

    const progress = ((currentQuestion) / questions.length) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';

    document.getElementById('main-btn').style.display = 'none';
}

function selectAnswer(selectedIndex, btn) {
    if (window.currentTimer) clearInterval(window.currentTimer);
    const correctIndex = questions[currentQuestion].c;
    const allBtns = document.querySelectorAll('.answer-btn');
    allBtns.forEach((b, i) => {
        b.style.pointerEvents = 'none';
        if (i === correctIndex) b.classList.add('correct');
        if (i === selectedIndex && i !== correctIndex) b.classList.add('wrong');
    });
    if (selectedIndex === correctIndex) score++;
    document.getElementById('main-btn').style.display = 'block';
}

function autoNext() {
    const allBtns = document.querySelectorAll('.answer-btn');
    allBtns.forEach(b => b.style.pointerEvents = 'none');
    document.getElementById('main-btn').style.display = 'block';
}

function nextQuestion() {
    if (window.currentTimer) clearInterval(window.currentTimer);
    currentQuestion++;
    if (currentQuestion < questions.length) {
        showQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    document.getElementById('quiz-screen').style.display = 'none';
    document.getElementById('main-btn').style.display = 'none';
    document.getElementById('waiting-screen').style.display = 'block';
    document.getElementById('personal-score').innerHTML = `Твой результат:<br><strong>${score} из 30</strong>`;

    allResults.push({ name: playerName, score: score });
}

function showFinalLeaderboard() {
    document.getElementById('waiting-screen').style.display = 'none';
    document.getElementById('final-screen').style.display = 'block';

    const tbody = document.querySelector('#leaderboard tbody');
    tbody.innerHTML = '';

    allResults.sort((a, b) => b.score - a.score);
    const maxScore = allResults[0].score;

    allResults.forEach((p, i) => {
        const row = document.createElement('tr');
        if (p.score === maxScore) row.style.background = 'linear-gradient(90deg, #fcd34d, #facc15)';
        row.innerHTML = `<td style="padding:16px;">${i+1}</td><td style="padding:16px;">${p.name}</td><td style="padding:16px; font-weight:bold;">${p.score}</td>`;
        tbody.appendChild(row);
    });

    const winners = allResults.filter(p => p.score === maxScore);
    const text = winners.length === 1 
        ? `🏆 Победитель — <b>${winners[0].name}</b>!`
        : `🏆 Победители: ${winners.map(w => w.name).join(', ')}`;
    document.getElementById('winner-announce').innerHTML = text;
}
</script>
</body>
</html>
